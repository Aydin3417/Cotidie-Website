<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Sayfa Bulunamadı | Cotidie</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Syne', system-ui, sans-serif;
            background: #080709;
            color: rgba(240, 236, 228, 0.85);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .bg-glow {
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
        }
        .bg-glow-1 { background: radial-gradient(circle, #c9a96e, transparent 60%); top: -20%; right: -10%; }
        .bg-glow-2 { background: radial-gradient(circle, #7aab8a, transparent 60%); bottom: -20%; left: -10%; }

        .error-code {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 300;
            color: rgba(201, 169, 110, 0.15);
            line-height: 1;
            margin-bottom: -20px;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 400;
            color: rgba(255,255,255,0.95);
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }
        h1 em { font-style: normal; color: #c9a96e; }
        p {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.5);
            max-width: 420px;
            line-height: 1.7;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            border-radius: 100px;
            background: #c9a96e;
            color: #080709;
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 12px 40px rgba(201, 169, 110, 0.35);
            position: relative;
            z-index: 1;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(201, 169, 110, 0.5);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="error-code">404</div>
    <h1>Bu sayfa <em>bulunamadı.</em></h1>
    <p>Aradığınız sayfa taşınmış veya silinmiş olabilir. Ana sayfaya dönerek yolunuza devam edebilirsiniz.</p>
    <a href="/" class="btn-home">Ana Sayfaya Dön</a>
</body>
</html>
